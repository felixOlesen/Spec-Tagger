<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spec Tagger Report</title>
    <link rel="stylesheet" href="./style.css">
    
    <!-- data.js is generated dynamically by Python at runtime -->
    <script src="./data.js"></script>
    <script src="./script.js" defer></script>
</head>
<body>
    <div class="layout-container">
        <header class="page-header">
            <h1>Spec Tagger Execution Report</h1>
        </header>

        <main>
            <section class="section">
                <h2>Test Results</h2>
                <div id="results-container" class="grid-container">
                    <!-- JS will inject test cards here -->
                </div>
            </section>

            <section class="section">
                <h2>Invalid Tags</h2>
                <div id="tags-container" class="grid-container">
                    <!-- JS will inject invalid tag cards here -->
                </div>
            </section>
        </main>
    </div>
</body>
</html>
